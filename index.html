<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番号呼び出しシステム｜すずき歯科</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --mint:#00C9A7;--navy:#0A1628;--dark:#0D1F35;
  --blue:#1A5FAB;--navy2:#1A3A5C;--skyblue:#5B9BD5;
  --white:#FFF;--warn:#FF6B6B;--dim:#8899A6;
  --radius:14px;--nav-h:52px;
  --new-ms:60000;   /* 最新扱い：1分 */
  --hist-ms:300000; /* 履歴表示：5分 */
}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans JP',sans-serif;background:var(--navy);color:var(--white)}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:200;display:flex;background:rgba(10,22,40,.97);border-bottom:1px solid rgba(0,201,167,.25);backdrop-filter:blur(12px)}
.nav-btn{flex:1;border:none;background:transparent;color:var(--dim);font-family:inherit;font-size:13px;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:color .2s;border-bottom:3px solid transparent}
.nav-btn.active{color:var(--mint);border-bottom-color:var(--mint)}
.nav-btn:not(.active):hover{color:var(--white)}
.nav-status{display:flex;align-items:center;gap:6px;padding:0 16px;font-size:11px;font-weight:700;color:var(--dim);flex-shrink:0}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:background .3s}
.status-dot.online{background:var(--mint)}
.status-dot.error{background:var(--warn)}

/* ── SCREENS ── */
.screen{display:none;position:fixed;top:var(--nav-h);left:0;right:0;bottom:0}
.screen.active{display:block}

/* ══════════════════════════════════════
   MONITOR — 白背景・紺文字
══════════════════════════════════════ */
#monitor{background:#F0F4F8;width:100%;height:100%;position:relative;overflow:hidden}

.rotate-notice{display:none;position:absolute;inset:0;z-index:50;background:#F0F4F8;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.rotate-notice-icon{font-size:48px}
.rotate-notice-text{font-size:18px;font-weight:700;color:#6B7A8D;letter-spacing:.1em}
@media(orientation:portrait){#monitor .rotate-notice{display:flex}}

.flash-overlay{position:absolute;inset:0;z-index:10;background:rgba(0,100,200,.08);opacity:0;pointer-events:none}
.flash-overlay.do-flash{animation:doFlash .6s ease-out forwards}
@keyframes doFlash{0%{opacity:1}100%{opacity:0}}

/* アイドル（テキストのみ・動画なしの場合のフォールバック） */
.m-idle{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;opacity:.4;transition:opacity .4s}
.m-idle.gone{opacity:0;pointer-events:none}

/* 待合室動画プレイヤー */
.m-video-wrap{position:absolute;inset:0;z-index:4;background:#000;display:none}
.m-video-wrap.show{display:block}
.m-video-wrap video{width:100%;height:100%;object-fit:contain;background:#000}
.m-video-wrap.show ~ .m-idle{display:none}
.m-idle-logo{font-size:15px;font-weight:700;letter-spacing:.2em;color:var(--navy2)}
.m-idle-text{font-size:20px;font-weight:400;color:#3D5A7A}
.m-idle-dot{width:8px;height:8px;border-radius:50%;background:var(--navy2);animation:idlePulse 2s ease-in-out infinite}
@keyframes idlePulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}

/* ── コンテナ全体 ── */
.m-container{
  display:none;
  position:absolute;inset:0;z-index:6;
  flex-direction:column;
  padding:8px 10px;gap:0;
  overflow:hidden;
}
.m-container.visible{display:flex}

/* ── 最新エリア（上部・flex:3） ── */
.m-new-area{
  flex:3;min-height:0;
  display:flex;flex-direction:column;
  gap:5px;
  overflow:hidden;
}

/* 最新カード（大） */
.m-new-card{
  flex:1;min-height:0;
  position:relative;overflow:hidden;
  border-radius:14px;
  display:flex;align-items:center;
  padding:0 clamp(14px,2.5vw,36px);
  gap:clamp(8px,1.5vw,20px);
  background:#FFF;
  border:2px solid var(--skyblue);
  box-shadow:0 2px 12px rgba(91,155,213,.2);
}
/* 最新カードが1枚のとき：数字をさらに大きく */
.m-new-area.solo .m-new-card .m-pt{font-size:clamp(70px,15vw,200px)}
.m-new-area.solo .m-new-card .m-ch{font-size:clamp(50px,10vw,150px)}
.m-new-area.solo .m-new-card .m-text{font-size:clamp(22px,3.5vw,48px)}
.m-new-area.solo .m-new-card .m-label{font-size:clamp(13px,1.8vw,22px)}
.m-floor{font-size:clamp(24px,4.5vw,60px);font-weight:900;color:#3D5A7A}
.m-new-area.solo .m-new-card .m-floor{font-size:clamp(30px,5.5vw,75px)}
.m-new-badge{
  position:absolute;top:10px;right:14px;
  font-size:clamp(9px,1vw,12px);font-weight:700;letter-spacing:.12em;
  color:var(--blue);background:#DDEEFF;
  border:1px solid var(--skyblue);border-radius:100px;
  padding:2px 10px;white-space:nowrap;
}
.m-bar-new{position:absolute;bottom:0;left:0;height:3px;background:var(--skyblue);opacity:.6}

/* ── バナー ── */
.m-banner{
  flex-shrink:0;
  display:none; /* JSで制御 */
  align-items:center;gap:10px;
  padding:0 14px;
  height:clamp(28px,4vh,40px);
  margin:4px 0;
}
.m-banner-line{flex:1;height:1.5px;background:#CBD5E0}
.m-banner-text{
  font-size:clamp(10px,1.3vw,15px);font-weight:700;
  letter-spacing:.12em;color:#718096;
  white-space:nowrap;
  background:#F0F4F8;padding:0 10px;
}

/* ── 履歴エリア（下部・flex:2） ── */
.m-hist-area{
  flex:2;min-height:0;
  display:flex;flex-direction:column;
  gap:4px;
  overflow:hidden;
}

/* 履歴カード（小） */
.m-hist-card{
  flex:1;min-height:0;
  position:relative;overflow:hidden;
  border-radius:10px;
  display:flex;align-items:center;
  padding:0 clamp(10px,1.8vw,24px);
  gap:clamp(6px,1.2vw,16px);
  background:#FFF;
  border:1px solid #CBD5E0;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
  opacity:.85;
}
.m-bar-hist{position:absolute;bottom:0;left:0;height:2px;background:#A0AEC0;opacity:.5}

/* ── 共通テキスト要素 ── */
.m-label{font-size:clamp(10px,1.3vw,15px);font-weight:700;color:#718096;white-space:nowrap;flex-shrink:0}
.m-pt{font-size:clamp(20px,3.8vw,52px);font-weight:900;line-height:1;font-variant-numeric:tabular-nums;color:var(--navy2);flex-shrink:0}
.m-div{width:2px;height:clamp(20px,3.5vh,52px);background:linear-gradient(to bottom,transparent,var(--skyblue),transparent);flex-shrink:0}
.m-ch{font-size:clamp(16px,3vw,40px);font-weight:900;line-height:1;font-variant-numeric:tabular-nums;color:var(--blue);flex-shrink:0}
.m-text{font-size:clamp(12px,1.8vw,24px);font-weight:700;color:var(--navy2);white-space:nowrap}
/* 履歴の数字は少し小さく */
.m-hist-card .m-pt{font-size:clamp(16px,2.4vw,34px);color:#4A6280}
.m-hist-card .m-ch{font-size:clamp(13px,1.9vw,26px);color:#5B7FA6}
.m-hist-card .m-text{font-size:clamp(11px,1.4vw,18px);color:#718096}
.m-hist-card .m-label{font-size:clamp(9px,1vw,12px);color:#A0AEC0}
.m-hist-card .m-floor{font-size:clamp(10px,1vw,16px);color:#5B7FA6;font-weight:700}
.m-hist-card .m-div{height:clamp(14px,2.5vh,32px)}
.m-time{margin-left:auto;font-size:clamp(9px,1vw,13px);color:#A0AEC0;flex-shrink:0;padding-left:8px}

/* bounce */
.do-bounce{animation:doBounce .55s cubic-bezier(.36,.07,.19,.97)}
@keyframes doBounce{0%{transform:scale(1)}20%{transform:scale(1.15)}40%{transform:scale(.94)}60%{transform:scale(1.06)}80%{transform:scale(.98)}100%{transform:scale(1)}}

/* ══════════════════════════════════════
   OPERATOR
══════════════════════════════════════ */
#operator{background:var(--dark);width:100%;height:100%;overflow:hidden}
.op-wrap{width:100%;height:100%;display:flex}

/* 横向き：3カラム */
@media(orientation:landscape){
  .op-wrap{flex-direction:row}
  .op-top{display:contents} /* 透過：子要素をop-wrapの直接子として扱う */
  .op-col-num{flex:1;border-right:1px solid rgba(255,255,255,.06)}
  .op-col-chair{flex:1.1;border-right:1px solid rgba(255,255,255,.06)}
  .op-col-hist{flex:1.2}
  .op-col-num,.op-col-chair,.op-col-hist{display:flex;flex-direction:column;padding:16px 14px;gap:10px;min-width:0;overflow:hidden}
}
/* 縦向き：上段（テンキー＋チェア）＋下段（履歴） */
@media(orientation:portrait){
  .op-wrap{flex-direction:column}
  .op-col-num{flex:none;width:45%;border-right:1px solid rgba(255,255,255,.06)}
  .op-col-chair{flex:none;width:55%}
  .op-col-num,.op-col-chair{display:flex;flex-direction:column;padding:12px 10px;gap:8px;min-width:0;overflow:hidden}
  .op-col-hist{flex:0 0 35%;border-top:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;padding:10px 12px;gap:8px;overflow:hidden}
  /* 上段を横並びに */
  .op-top{flex:1;min-height:0;display:flex;flex-direction:row}
}
.panel-title{font-size:10px;font-weight:700;letter-spacing:.22em;color:var(--mint);text-transform:uppercase;flex-shrink:0}
.pt-display{flex-shrink:0;background:rgba(0,0,0,.38);border:1.5px solid rgba(0,201,167,.22);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;justify-content:flex-end;min-height:64px}
.pt-num{font-size:clamp(32px,5vw,50px);font-weight:900;font-variant-numeric:tabular-nums;color:var(--white);line-height:1}
.pt-placeholder{font-size:clamp(16px,2.5vw,22px);font-weight:300;color:rgba(255,255,255,.15)}
.pt-cursor{width:3px;height:clamp(30px,4vw,46px);background:var(--mint);margin-left:4px;animation:cursorBlink 1s step-end infinite;border-radius:2px}
@keyframes cursorBlink{0%,100%{opacity:1}50%{opacity:0}}
.numpad{flex:1;min-height:0;display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.nk{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:11px;color:var(--white);font-family:inherit;font-size:clamp(18px,3vw,26px);font-weight:700;cursor:pointer;transition:background .12s,border-color .12s,transform .1s;display:flex;align-items:center;justify-content:center}
.nk:hover{background:rgba(0,201,167,.15);border-color:var(--mint)}
.nk:active{transform:scale(.91)}
.nk.nk-del{background:rgba(255,107,107,.07);border-color:rgba(255,107,107,.2);font-size:clamp(14px,2.2vw,20px);color:var(--warn)}
.nk.nk-del:hover{background:rgba(255,107,107,.2);border-color:var(--warn)}
.nk.nk-clr{background:rgba(255,107,107,.04);border-color:rgba(255,107,107,.14);font-size:clamp(9px,1.2vw,12px);letter-spacing:.04em;color:rgba(255,107,107,.65);font-weight:700}
.nk.nk-zero{grid-column:1}
.chair-grid{flex:1;min-height:0;display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.ck{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:11px;color:var(--white);font-family:inherit;font-size:clamp(16px,2.5vw,22px);font-weight:900;cursor:pointer;transition:background .13s,border-color .13s,transform .1s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:4px}
.ck-sub{font-size:9px;font-weight:400;letter-spacing:.08em;color:var(--dim)}
.ck:hover{background:rgba(0,201,167,.1);border-color:rgba(0,201,167,.38)}
.ck:active{transform:scale(.91)}
.ck.ck-sel{background:rgba(0,201,167,.2);border-color:var(--mint);color:var(--mint);box-shadow:0 0 12px rgba(0,201,167,.3)}
.ck.ck-sel .ck-sub{color:rgba(0,201,167,.7)}
.preview-card{flex-shrink:0;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:9px 13px;display:flex;align-items:center;justify-content:space-between;font-size:12px;min-height:40px}
.pv-val{font-weight:700;color:var(--mint);font-size:13px}
.send-btn{flex-shrink:0;width:100%;padding:14px;background:var(--mint);border:none;border-radius:var(--radius);color:var(--navy);font-family:inherit;font-size:15px;font-weight:900;letter-spacing:.07em;cursor:pointer;transition:background .15s,transform .15s,box-shadow .15s;display:flex;align-items:center;justify-content:center;gap:7px}
.send-btn:hover:not(:disabled){background:#00dfb9;transform:translateY(-1px);box-shadow:0 5px 18px rgba(0,201,167,.4)}
.send-btn:active:not(:disabled){transform:translateY(0)}
.send-btn:disabled{background:rgba(255,255,255,.09);color:var(--dim);cursor:not-allowed}
.hist-list{flex:1;min-height:0;display:flex;flex-direction:column;gap:5px;overflow-y:auto}
.hist-list::-webkit-scrollbar{width:3px}
.hist-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.hist-item{flex-shrink:0;position:relative;overflow:hidden;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:8px 12px;display:flex;align-items:center;gap:8px;min-height:42px}
.hist-item.hi-new{border-color:rgba(0,201,167,.38);background:rgba(0,201,167,.08)}
.hist-item.hi-exp{opacity:.28}
.hi-pt{font-size:15px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--white)}
.hi-arr{font-size:11px;color:var(--dim);flex-shrink:0}
.hi-ch{font-size:15px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--mint)}
.hi-unit{font-size:11px;color:rgba(255,255,255,.35)}
.hi-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:1px;flex-shrink:0}
.hi-time{font-size:11px;color:var(--dim)}
.hi-rem{font-size:10px;color:rgba(255,107,107,.8)}
.hi-bar{position:absolute;bottom:0;left:0;height:2px;background:var(--mint);opacity:.4}
.hist-empty-msg{color:rgba(255,255,255,.18);font-size:13px;text-align:center;padding:18px 0}
.toast{position:fixed;top:calc(var(--nav-h) + 10px);left:50%;transform:translateX(-50%) translateY(-6px);background:var(--mint);color:var(--navy);padding:9px 22px;border-radius:100px;font-size:13px;font-weight:700;letter-spacing:.04em;opacity:0;pointer-events:none;z-index:999;transition:opacity .25s,transform .25s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-btn active" onclick="switchScreen('monitor',this)">📺　モニター画面</button>
  <button class="nav-btn"        onclick="switchScreen('operator',this)">⌨️　オペレーター画面</button>
  <div class="nav-status">
    <div class="status-dot online"></div>
    <span>Firebase連携中</span>
  </div>
</nav>
<div class="toast" id="toast"></div>

<!-- MONITOR -->
<div class="screen active" id="monitor">
  <div class="flash-overlay" id="flashOverlay"></div>
  <div class="rotate-notice">
    <div class="rotate-notice-icon">🔄</div>
    <div class="rotate-notice-text">横向きにしてください</div>
  </div>
  <div class="m-video-wrap" id="mVideoWrap">
    <video id="mVideo" playsinline muted preload="auto"></video>
    <div id="mSoundPrompt" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55);color:#fff;font-size:clamp(16px,2.5vw,28px);font-weight:700;cursor:pointer;z-index:7;text-align:center;padding:20px;">
      画面をタップして音声を有効にしてください 🔊
    </div>
  </div>
  <div class="m-idle" id="mIdle">
    <div class="m-idle-logo">瑞穂すずき歯科・矯正歯科</div>
    <div class="m-idle-text">お呼びするまで、しばらくお待ちください</div>
    <div class="m-idle-dot"></div>
  </div>
  <!-- 最新エリア＋バナー＋履歴エリア -->
  <div class="m-container" id="mContainer">
    <div class="m-new-area" id="mNewArea"></div>
    <div class="m-banner" id="mBanner">
      <div class="m-banner-line"></div>
      <div class="m-banner-text">✅　お呼び出し済み</div>
      <div class="m-banner-line"></div>
    </div>
    <div class="m-hist-area" id="mHistArea"></div>
  </div>
</div>

<!-- OPERATOR -->
<div class="screen" id="operator">
  <div class="op-wrap">
    <!-- 縦向き時の上段ラッパー -->
    <div class="op-top">
      <div class="op-col-num">
        <div class="panel-title">診察券番号</div>
        <div class="pt-display">
          <span class="pt-num" id="ptNum" style="display:none"></span>
          <span class="pt-placeholder" id="ptPh">番号を入力</span>
          <div class="pt-cursor"></div>
        </div>
        <div class="numpad">
          <button class="nk" onclick="nkInput('1')">1</button>
          <button class="nk" onclick="nkInput('2')">2</button>
          <button class="nk" onclick="nkInput('3')">3</button>
          <button class="nk" onclick="nkInput('4')">4</button>
          <button class="nk" onclick="nkInput('5')">5</button>
          <button class="nk" onclick="nkInput('6')">6</button>
          <button class="nk" onclick="nkInput('7')">7</button>
          <button class="nk" onclick="nkInput('8')">8</button>
          <button class="nk" onclick="nkInput('9')">9</button>
          <button class="nk nk-zero" onclick="nkInput('0')">0</button>
          <button class="nk nk-del"  onclick="nkDel()">⌫</button>
          <button class="nk nk-clr"  onclick="nkClear()">CLR</button>
        </div>
      </div>
      <div class="op-col-chair">
        <div class="panel-title">チェア番号（1〜11）</div>
        <div class="chair-grid" id="chairGrid"></div>
        <div class="preview-card">
          <span style="color:var(--dim);font-size:11px">呼び出し内容</span>
          <span id="pvText" style="display:none">
            診察券 <span class="pv-val" id="pvPt"></span> →
            <span class="pv-val" id="pvCh"></span>番チェア
          </span>
          <span id="pvEmpty" style="color:rgba(255,255,255,.2);font-size:11px">入力してください</span>
        </div>
        <button class="send-btn" id="sendBtn" disabled onclick="doSend()">
          <span>📢</span><span>呼び出す</span>
        </button>
      </div>
    </div>
    <div class="op-col-hist">
      <div class="panel-title">呼び出し履歴（最大9件 / 5分間表示）</div>
      <div class="hist-list" id="histList"></div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
/* ── Firebase ── */
var db = null;
var callsRef = null;



try {
  firebase.initializeApp({
    apiKey: "AIzaSyBVzADt_pFMv5MH6KrwZYror6Ox7ziULFs",
    authDomain: "suzukidentalcall.firebaseapp.com",
    databaseURL: "https://suzukidentalcall-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "suzukidentalcall",
    storageBucket: "suzukidentalcall.firebasestorage.app",
    messagingSenderId: "1056172336224",
    appId: "1:1056172336224:web:cc777677f04c316f980f05"
  });
  db = firebase.database();
  callsRef = db.ref('calls');


} catch(e) {
  console.warn('Firebase init failed:', e);
  console.warn('Firebase未接続（デモモード）');
}

/* ── 定数 ── */
var NEW_MS  = 60000;   /* 最新扱い：1分（この後「お呼び出し済み」履歴に移動） */
var HIST_MS = 300000;  /* 履歴表示：5分 */
var VIDEO_RESUME_MS = 120000; /* 最後の呼び出しから2分間、新しい呼び出しが無ければ動画に戻る */
var lastCallTs = 0; /* 直近の呼び出し時刻（動画復帰タイマーの基準） */

/* ── 待合室動画プレイリスト ── */
/* videosフォルダに動画を追加したら、ここに 'videos/ファイル名.mp4' を追記するだけで
   本数に関わらず自動的に順番に再生されます（最後まで行ったら1本目に戻ります） */
var VIDEO_PLAYLIST = [
  'videos/video1.mp4',
  'videos/video2.mp4',
  'videos/video3.mp4'
];
var videoIndex = 0;
var videoEl = document.getElementById('mVideo');
var videoWrap = document.getElementById('mVideoWrap');
var isCallShowing = false; /* 呼び出し画面を表示中かどうか */

function loadVideo(idx) {
  if (!videoEl || VIDEO_PLAYLIST.length === 0) return;
  videoIndex = idx % VIDEO_PLAYLIST.length;
  videoEl.src = VIDEO_PLAYLIST[videoIndex];
  videoEl.load();
  videoEl.play().catch(function(e) { console.warn('動画自動再生がブロックされました:', e); });
  preloadNextVideo();
}

/* 次の動画をあらかじめ裏でダウンロードしてブラウザキャッシュに乗せておく
   （切り替わり時の読み込み待ちを防ぐ） */
function preloadNextVideo() {
  if (VIDEO_PLAYLIST.length <= 1) return;
  var nextIdx = (videoIndex + 1) % VIDEO_PLAYLIST.length;
  var preloadEl = document.createElement('video');
  preloadEl.preload = 'auto';
  preloadEl.muted = true;
  preloadEl.style.display = 'none';
  preloadEl.src = VIDEO_PLAYLIST[nextIdx];
  document.body.appendChild(preloadEl);
  preloadEl.load();
  /* 読み込み完了したら不要なので削除（キャッシュには残る） */
  preloadEl.addEventListener('canplaythrough', function() {
    if (preloadEl.parentNode) preloadEl.parentNode.removeChild(preloadEl);
  });
}

/* 動画が終わったら次の動画へ（最後まで行ったら1本目に戻る） */
if (videoEl) {
  videoEl.addEventListener('ended', function() {
    loadVideo(videoIndex + 1);
  });
}

/* 呼び出し画面 ⇔ 動画 の表示切り替え */
function showVideoMode() {
  isCallShowing = false;
  if (videoWrap) videoWrap.classList.add('show');
  var container = document.getElementById('mContainer');
  if (container) container.classList.remove('visible');
  if (videoEl && videoEl.paused && videoEl.src) {
    videoEl.play().catch(function(){});
  }
}
function showCallMode() {
  isCallShowing = true;
  if (videoWrap) videoWrap.classList.remove('show');
  if (videoEl) videoEl.pause();
}

/* 初回ロード */
if (VIDEO_PLAYLIST.length > 0) {
  loadVideo(0);
  if (videoWrap) videoWrap.classList.add('show');
}

/* 画面タップで音声付き再生を有効化（ブラウザの自動再生ポリシー対応） */
var soundPrompt = document.getElementById('mSoundPrompt');
function enableSound() {
  if (videoEl) {
    videoEl.muted = false;
    videoEl.play().catch(function(){});
  }
  if (soundPrompt) soundPrompt.style.display = 'none';
}
if (soundPrompt) {
  soundPrompt.addEventListener('click', enableSound);
  soundPrompt.addEventListener('touchstart', enableSound);
}

/* ── ローカル状態 ── */
var ptInput  = '';
var selChair = null;
var calls    = [];
var prevNewestTs = 0;
var ticker   = null;

/* ── チェアグリッド ── */
var cg = document.getElementById('chairGrid');
cg.innerHTML = ''; /* 重複生成を防ぐ */
for (var ci = 1; ci <= 11; ci++) {
  (function(n) {
    var b = document.createElement('button');
    b.className = 'ck'; b.id = 'ck' + n;
    b.innerHTML = '<span>' + n + '</span><span class="ck-sub">チェア</span>';
    b.onclick = function() { selChairFn(n); };
    cg.appendChild(b);
  })(ci);
}

/* ── テンキー ── */
function nkInput(d) { if (ptInput.length >= 6) return; ptInput += d; updatePtDisplay(); }
function nkDel()    { ptInput = ptInput.slice(0,-1); updatePtDisplay(); }
function nkClear()  { ptInput = ''; updatePtDisplay(); }
function updatePtDisplay() {
  var n = document.getElementById('ptNum'), p = document.getElementById('ptPh');
  if (ptInput) { n.textContent = ptInput; n.style.display=''; p.style.display='none'; }
  else         { n.style.display='none'; p.style.display=''; }
  updatePreview();
}
function selChairFn(n) {
  document.querySelectorAll('.ck').forEach(function(b){ b.classList.remove('ck-sel'); });
  selChair = n;
  document.getElementById('ck'+n).classList.add('ck-sel');
  updatePreview();
}
function updatePreview() {
  var ready = ptInput && selChair;
  document.getElementById('pvPt').textContent = ptInput;
  document.getElementById('pvCh').textContent = selChair ? String(selChair) : '';
  document.getElementById('pvText').style.display  = ready ? '' : 'none';
  document.getElementById('pvEmpty').style.display = ready ? 'none' : '';
  document.getElementById('sendBtn').disabled = !ready;
}
function pad(n) { return n < 10 ? '0'+n : ''+n; }
function floorOf(chair) { return chair <= 5 ? '1階' : '2階'; }

/* ── 送信 ── */
function doSend() {
  if (!ptInput || !selChair) return;
  var now = new Date();
  if (callsRef) {
    callsRef.push({
      patient: ptInput, chair: selChair,
      time: pad(now.getHours())+':'+pad(now.getMinutes()),
      ts: firebase.database.ServerValue.TIMESTAMP /* 端末ごとの時計ズレを避け、Firebaseサーバー時刻を使用 */
    }, function(err) {
      showToast(err ? '送信エラー：'+err.message
                    : '診察券 '+ptInput+' → '+selChair+'番チェア を呼び出しました');
    });
  } else {
    /* デモモード：ローカルのみ */
    var entry = { patient: ptInput, chair: selChair,
      time: pad(now.getHours())+':'+pad(now.getMinutes()), ts: Date.now(),
      _receivedAt: Date.now(),
      _key: 'local-'+(Date.now()) };
    calls.unshift(entry);
    if (calls.length > 10) calls.pop();
    var newO=[], histO=[];
    var n2=Date.now();
    for (var ii=0;ii<calls.length;ii++){
      var ag=n2-(calls[ii]._receivedAt||calls[ii].ts);
      if (ag<NEW_MS) newO.push(calls[ii]);
      else if (ag<HIST_MS && histO.length<9) histO.push(calls[ii]);
    }
    renderMonitor(newO, histO);
    renderHist();
    showToast('診察券 '+ptInput+' → '+selChair+'番チェア を呼び出しました');
  }
  ptInput=''; selChair=null;
  updatePtDisplay();
  document.querySelectorAll('.ck').forEach(function(b){ b.classList.remove('ck-sel'); });
}

/* ── Firebase リッスン ── */
if (callsRef) {
/* 各呼び出しデータを「初めて受信したローカル時刻」を記録しておくマップ
   （カウントダウン表示の基準。端末の時計設定に依存しない） */
var receivedAtMap = {};

callsRef.on('value', function(snapshot) {
  var now = Date.now();
  var raw = [];
  snapshot.forEach(function(child) {
    var v = child.val(); v._key = child.key;
    /* 初めて見たデータならこの瞬間を受信時刻として記録 */
    if (!receivedAtMap[child.key]) {
      receivedAtMap[child.key] = now;
    }
    v._receivedAt = receivedAtMap[child.key];
    raw.push(v);
  });
  /* 順序判定はFirebaseのpushキー（_key）基準で安定させる。
     pushキーは時系列順にソート可能な文字列のため、サーバータイムスタンプの
     「ローカル推定値→サーバー確定値」という2段階更新による表示の揺れ（1つ遅れ）が起きない */
  raw.sort(function(a,b){ return a._key < b._key ? 1 : (a._key > b._key ? -1 : 0); });

  /* 最新／履歴の判定は「このブラウザが受信してからの経過時間」で行う
     （端末の時計設定に左右されないカウントダウンにするため） */
  var newOnes  = [];
  var histOnes = [];
  for (var i = 0; i < raw.length; i++) {
    var age = now - raw[i]._receivedAt;
    if (age >= 0 && age < NEW_MS) {
      newOnes.push(raw[i]);
    } else if (age >= NEW_MS && age < HIST_MS) {
      if (histOnes.length < 9) histOnes.push(raw[i]);
    }
    /* HIST_MS以上は無視（削除対象） */
  }
  calls = newOnes.concat(histOnes);

  /* 最後の呼び出し時刻を更新（動画復帰タイマーの基準）— こちらも受信時刻基準 */
  if (raw.length > 0) {
    lastCallTs = raw[0]._receivedAt; /* raw は ts(サーバー時刻) 降順ソート済みなので先頭が最新。動画復帰タイマーは受信時刻基準 */
  }

  renderMonitor(newOnes, histOnes);
  renderHist();

}, function(err) { console.error('Firebase read error:', err); });
} /* end if(callsRef) */

/* 5秒ごとに再描画 ＋ 期限切れデータの削除（Firebaseリッスンの外側・1回だけ起動）
   削除処理をリッスンの中に置くと、削除→再発火→また削除…の連鎖が起きるためここに分離 */
if (!ticker) {
  ticker = setInterval(function() {
    var n2 = Date.now();
    var newOnes2 = [], histOnes2 = [];
    for (var j = 0; j < calls.length; j++) {
      var age2 = n2 - (calls[j]._receivedAt||calls[j].ts);
      if (age2 >= 0 && age2 < NEW_MS) {
        newOnes2.push(calls[j]);
      } else if (age2 >= NEW_MS && age2 < HIST_MS) {
        if (histOnes2.length < 9) histOnes2.push(calls[j]);
      } else if (age2 >= HIST_MS && callsRef) {
        /* 期限切れはFirebaseから削除（_keyが必要） */
        if (calls[j]._key) callsRef.child(calls[j]._key).remove();
      }
    }
    renderMonitor(newOnes2, histOnes2);
    renderHist();
  }, 5000);
}

/* ── モニター描画 ── */
function renderMonitor(newOnes, histOnes) {
  var container = document.getElementById('mContainer');
  var idle      = document.getElementById('mIdle');
  var newArea   = document.getElementById('mNewArea');
  var banner    = document.getElementById('mBanner');
  var histArea  = document.getElementById('mHistArea');

  var now = Date.now();
  var sinceLastCall = lastCallTs ? (now - lastCallTs) : Infinity;
  var shouldShowVideo = (newOnes.length === 0 && histOnes.length === 0) ||
                        sinceLastCall >= VIDEO_RESUME_MS;

  if (shouldShowVideo) {
    container.classList.remove('visible');
    prevNewestTs = 0;
    if (VIDEO_PLAYLIST.length > 0) {
      idle.classList.add('gone'); /* 動画がある場合はアイドルテキストを隠す */
      showVideoMode();
    } else {
      idle.classList.remove('gone'); /* 動画がない場合のフォールバック表示 */
    }
    return;
  }
  idle.classList.add('gone');
  container.classList.add('visible');
  showCallMode(); /* 呼び出しがあれば動画を止めて呼び出し画面表示 */

  /* ── 最新エリア ── */
  newArea.innerHTML = '';
  if (newOnes.length > 0) {
    newArea.classList.toggle('solo', newOnes.length === 1);
    for (var i = 0; i < newOnes.length; i++) {
      var e = newOnes[i];
      var key = e._key || ('n'+i);
      var remNew = Math.max(0, NEW_MS - (now - (e._receivedAt||e.ts)));
      var bw = (remNew / NEW_MS * 100).toFixed(1);
      var card = document.createElement('div');
      card.className = 'm-new-card';
      card.innerHTML =
        '<div class="m-bar-new" style="width:'+bw+'%"></div>' +
        '<span class="m-new-badge">📢 最新のご案内</span>' +
        '<span class="m-label">診察券番号</span>' +
        '<div class="m-pt" id="mn-p-'+key+'">'+e.patient+'</div>' +
        '<span class="m-label">の方</span>' +
        '<div class="m-div"></div>' +
        '<span class="m-floor">'+floorOf(e.chair)+'</span>' +
        '<div class="m-ch" id="mn-c-'+key+'">'+e.chair+'</div>' +
        '<div class="m-text">番チェアまでお越しください。</div>' +
        '<div class="m-time">'+e.time+'</div>';
      newArea.appendChild(card);
    }
  } else {
    newArea.classList.remove('solo');
    newArea.innerHTML = '';
  }

  /* ── バナー ── */
  banner.style.display = (newOnes.length > 0 && histOnes.length > 0) ? 'flex' : 'none';

  /* ── 履歴エリア ── */
  histArea.innerHTML = '';
  if (histOnes.length > 0) {
    for (var j = 0; j < histOnes.length; j++) {
      var eh = histOnes[j];
      var bwh = (Math.max(0, HIST_MS - (now - (eh._receivedAt||eh.ts))) / HIST_MS * 100).toFixed(1);
      var hcard = document.createElement('div');
      hcard.className = 'm-hist-card';
      hcard.innerHTML =
        '<div class="m-bar-hist" style="width:'+bwh+'%"></div>' +
        '<span class="m-label">診察券番号</span>' +
        '<div class="m-pt">'+eh.patient+'</div>' +
        '<span class="m-label">の方</span>' +
        '<div class="m-div"></div>' +
        '<span class="m-floor">'+floorOf(eh.chair)+'</span>' +
        '<div class="m-ch">'+eh.chair+'</div>' +
        '<div class="m-text">番チェア</div>' +
        '<div class="m-time">'+eh.time+'</div>';
      histArea.appendChild(hcard);
    }
  }

  /* ── 新着アニメーション ── */
  if (newOnes.length > 0 && newOnes[0].ts !== prevNewestTs) {
    prevNewestTs = newOnes[0].ts;
    triggerNewAnim(newOnes[0]);
  }
}

function triggerNewAnim(entry) {
  var fl = document.getElementById('flashOverlay');
  fl.classList.remove('do-flash'); void fl.offsetWidth; fl.classList.add('do-flash');
  setTimeout(function() {
    var key = entry._key || 'n0';
    var p = document.getElementById('mn-p-'+key);
    var c = document.getElementById('mn-c-'+key);
    if (p) { p.classList.remove('do-bounce'); void p.offsetWidth; p.classList.add('do-bounce'); }
    if (c) { c.classList.remove('do-bounce'); void c.offsetWidth; c.classList.add('do-bounce'); }
  }, 30);
  playChime();
}

/* ── オペレーター履歴 ── */
function renderHist() {
  var list = document.getElementById('histList');
  list.innerHTML = '';
  if (calls.length === 0) {
    var em = document.createElement('div');
    em.className = 'hist-empty-msg';
    em.textContent = 'まだ呼び出し履歴はありません';
    list.appendChild(em); return;
  }
  var now = Date.now();
  for (var i = 0; i < calls.length; i++) {
    var e = calls[i];
    var isNew = now - (e._receivedAt||e.ts) < NEW_MS;
    var remSec = Math.max(0, Math.ceil((HIST_MS - (now - (e._receivedAt||e.ts))) / 1000));
    var remStr = remSec >= 60
      ? '残'+Math.floor(remSec/60)+'分'+pad(remSec%60)+'秒'
      : '残'+remSec+'秒';
    var bw = (Math.max(0, HIST_MS - (now - (e._receivedAt||e.ts))) / HIST_MS * 100).toFixed(1);
    var item = document.createElement('div');
    item.className = 'hist-item' + (isNew ? ' hi-new' : '');
    item.innerHTML =
      '<div class="hi-bar" style="width:'+bw+'%"></div>' +
      '<span class="hi-pt">'+e.patient+'</span>' +
      '<span class="hi-arr">→</span>' +
      '<span class="hi-ch">'+e.chair+'</span>' +
      '<span class="hi-unit">'+floorOf(e.chair)+' 番チェア</span>' +
      '<div class="hi-right">' +
        '<span class="hi-time">'+e.time+'</span>' +
        '<span class="hi-rem">'+(isNew ? '最新' : remStr)+'</span>' +
      '</div>';
    list.appendChild(item);
  }
}

/* ── チャイム ── */
function playChime() {
  try {
    var ac = new (window.AudioContext||window.webkitAudioContext)();
    [523.25,659.25,783.99,1046.5].forEach(function(f,i) {
      var o=ac.createOscillator(), g=ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type='sine'; o.frequency.value=f;
      var t=ac.currentTime+i*.16;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(.25,t+.02);
      g.gain.exponentialRampToValueAtTime(.001,t+.62);
      o.start(t); o.stop(t+.7);
    });
  } catch(e) {}
}

function showToast(msg) {
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); },2800);
}
function switchScreen(id,btn) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('operator').classList.contains('active')) return;
  if (e.key>='0'&&e.key<='9') nkInput(e.key);
  if (e.key==='Backspace') { e.preventDefault(); nkDel(); }
  if (e.key==='Escape') nkClear();
  if (e.key==='Enter') doSend();
});

/* ── オペレーター画面：5分間無操作で自動リロード ──
   Safariのバックグラウンド制限等でFirebase接続が古くなるのを防ぐため、
   操作が一定時間ないときだけページを再読み込みして接続をリフレッシュする。
   モニター画面が表示中は対象外（動画再生やお知らせ表示の邪魔をしないため）。 */
var IDLE_RELOAD_MS = 5 * 60 * 1000; /* 5分 */
var idleReloadTimer = null;

function resetIdleReloadTimer() {
  if (idleReloadTimer) clearTimeout(idleReloadTimer);
  /* オペレーター画面が表示されている時だけタイマーを動かす */
  var opScreen = document.getElementById('operator');
  if (opScreen && opScreen.classList.contains('active')) {
    idleReloadTimer = setTimeout(function() {
      location.reload();
    }, IDLE_RELOAD_MS);
  }
}

/* ユーザー操作とみなすイベント全般を監視 */
['click', 'touchstart', 'keydown', 'mousemove'].forEach(function(evt) {
  document.addEventListener(evt, resetIdleReloadTimer, { passive: true });
});

/* 画面切り替え時にもタイマーを再設定（モニター画面に切り替えたら自動リロードを止める） */
var _origSwitchScreen = switchScreen;
switchScreen = function(id, btn) {
  _origSwitchScreen(id, btn);
  resetIdleReloadTimer();
};

/* 初回起動 */
resetIdleReloadTimer();
</script>
</body>
